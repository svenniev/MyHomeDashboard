services:
  app:
    build: .
    image: myhomedashboard:local
    container_name: myhomedashboard-app
    restart: unless-stopped
    ports:
      - "8090:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads

  db:
    image: postgres:17-alpine
    container_name: myhomedashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myhomedashboard
      POSTGRES_USER: myhomedashboard
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhomedashboard -d myhomedashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
