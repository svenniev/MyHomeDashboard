# This file is for local development, allowing you to use different volumes or ports.
services:
  app:
    build: .
    image: myhomedashboard:local
    container_name: myhomedashboard-app-dev
    restart: unless-stopped
    ports:
      - "8090:3000"
      - "5173:5173" # Vite dev server
    env_file:
      - compose.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./client:/app/client
      - ./server:/app/server
      - ./data/uploads:/app/uploads

  db:
    image: postgres:17-alpine
    container_name: myhomedashboard-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: myhomedashboard
      POSTGRES_USER: myhomedashboard
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5433:5432" # Use a different port to avoid conflicts with production
    volumes:
      - ./data/postgres-dev:/var/lib/postgresql/data
      - ./data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhomedashboard -d myhomedashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
